name: 🤖 Codex Auto Fix

on:
  workflow_dispatch: # ✅ permite rodar manualmente no GitHub Actions
  push:
    branches:
      - main
      - codex/*
  pull_request:
    branches:
      - main

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write # necessário para o bot poder fazer git push

    steps:
      - name: 🧩 Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ⚙️ Install dependencies
        run: |
          npm ci

      - name: 🧠 Auto-fix source code
        env:
          FIX_EXCLUDE: "src/app/layout.tsx src/app/_app.tsx src/app/**/layout.tsx"
        run: |
          echo "Running Codex Auto-Fix..."
          echo "⛔ Ignorando arquivos protegidos: $FIX_EXCLUDE"

          # 🔍 Limpa marcadores de conflito apenas em código-fonte (sem erro se a pasta não existir)
          find src src/app -type f \( -name "*.js" -o -name "*.ts" -o -name "*.tsx" -o -name "*.jsx" \) 2>/dev/null \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/dist/*" \
            -not -path "*/layout.tsx" \
            -not -name "_app.tsx" \
            -exec sed -i '/<<<<<<<\|=======\|>>>>>>>/d' {} \; || true

          # 💅 Formata o código (Prettier ignora erros)
          npx prettier --write . --ignore-path .prettierignore || true
          npx eslint --fix . --ext .tsx,.ts --ignore-pattern "src/app/layout.tsx" --ignore-pattern "src/app/_app.tsx" --ignore-pattern "src/app/**/layout.tsx" || true

      - name: 🧠 Check & Repair Bankinter Upload
        run: node scripts/codex-check-last-bankinter-log.js || true

      - name: 🏦 Implement Bankinter EUR Upload Endpoint with Validation
        run: node scripts/codex-implement-bankinter-validation.js

      - name: 🚀 Commit & Push changes
        run: |
          git config --global user.name "Codex AutoFix Bot"
          git config --global user.email "codex@dsdgroup.es"
          git add .
          git commit -m "🤖 auto-fix: format and clean code" || echo "No changes to commit"
          git push || echo "⚠️ No push made (nothing to update)"
